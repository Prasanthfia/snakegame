<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080810;font-family:'Exo 2',sans-serif;}
  h1{font-family:'Orbitron';color:#00ff88;font-size:28px;letter-spacing:4px;margin-bottom:8px;text-shadow:0 0 20px rgba(0,255,136,0.5);}
  .hud{display:flex;gap:40px;margin-bottom:16px;}
  .hud-item{text-align:center;}
  .hud-val{font-family:'Orbitron';font-size:24px;color:#00ff88;font-weight:700;}
  .hud-label{font-size:11px;color:#446644;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  canvas{border:1px solid #00ff8833;border-radius:4px;box-shadow:0 0 40px rgba(0,255,136,0.1);}
  .controls{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .btn{padding:10px 24px;background:transparent;border:1px solid #00ff8844;color:#00ff88;font-family:'Orbitron';font-size:12px;border-radius:8px;cursor:pointer;transition:all 0.2s;letter-spacing:2px;}
  .btn:hover{background:#00ff8822;border-color:#00ff88;}
  .overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  .msg{font-family:'Orbitron';color:#00ff88;font-size:20px;letter-spacing:3px;text-shadow:0 0 20px rgba(0,255,136,0.6);}
  .sub-msg{color:#446644;font-size:13px;letter-spacing:2px;}
  .canvas-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<h1>SNAKE</h1>
<div class="hud">
  <div class="hud-item"><div class="hud-val" id="score">0</div><div class="hud-label">Score</div></div>
  <div class="hud-item"><div class="hud-val" id="best">0</div><div class="hud-label">Best</div></div>
  <div class="hud-item"><div class="hud-val" id="level">1</div><div class="hud-label">Level</div></div>
</div>
<div class="canvas-wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <div class="msg">PRESS SPACE</div>
    <div class="sub-msg">TO START</div>
  </div>
</div>
<div class="controls">
  <button class="btn" onclick="startGame()">START</button>
  <button class="btn" onclick="togglePause()">PAUSE</button>
  <button class="btn" onclick="resetGame()">RESET</button>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const SZ=20,COLS=20,ROWS=20;
let snake,dir,food,score,best=0,loop,paused=false,running=false,level=1;

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};food=randFood();score=0;level=1;
  updateHUD();
}

function randFood(){
  let f;
  do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===f.x&&s.y===f.y));
  return f;
}

function draw(){
  ctx.fillStyle='#080810';ctx.fillRect(0,0,400,400);
  // grid
  ctx.strokeStyle='rgba(0,255,136,0.03)';ctx.lineWidth=1;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,400);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(400,i*SZ);ctx.stroke();}
  // food
  ctx.shadowColor='#ff4444';ctx.shadowBlur=15;
  ctx.fillStyle='#ff4444';
  ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,7,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // snake
  snake.forEach((s,i)=>{
    const alpha=1-(i/snake.length)*0.6;
    ctx.shadowColor=`rgba(0,255,136,${alpha})`;ctx.shadowBlur=i===0?20:5;
    ctx.fillStyle=i===0?'#00ff88':`rgba(0,${180+Math.floor(75*(1-i/snake.length))},${80+Math.floor(56*(1-i/snake.length))},${alpha})`;
    const pad=i===0?1:2;
    ctx.beginPath();ctx.roundRect(s.x*SZ+pad,s.y*SZ+pad,SZ-pad*2,SZ-pad*2,i===0?4:2);ctx.fill();
  });
  ctx.shadowBlur=0;
}

function step(){
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10*level;if(score%50===0)level=Math.min(10,level+1);
    food=randFood();updateHUD();clearInterval(loop);loop=setInterval(step,Math.max(60,200-level*15));
  } else snake.pop();
  draw();
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  if(score>best){best=score;document.getElementById('best').textContent=best;}
  document.getElementById('level').textContent=level;
}

function startGame(){
  if(running)return;
  init();running=true;paused=false;
  document.getElementById('overlay').style.display='none';
  loop=setInterval(step,200);draw();
}

function togglePause(){
  if(!running)return;
  paused=!paused;
  if(paused){clearInterval(loop);showOverlay('PAUSED','PRESS SPACE TO RESUME');}
  else{document.getElementById('overlay').style.display='none';loop=setInterval(step,Math.max(60,200-level*15));}
}

function gameOver(){
  clearInterval(loop);running=false;
  showOverlay('GAME OVER','SCORE: '+score);
}

function resetGame(){clearInterval(loop);running=false;init();draw();showOverlay('PRESS SPACE','TO START');}

function showOverlay(msg,sub){
  const o=document.getElementById('overlay');o.style.display='flex';
  o.innerHTML=`<div class="msg">${msg}</div><div class="sub-msg">${sub}</div>`;
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();running?togglePause():startGame();}
  if(!running||paused)return;
  if(e.key==='ArrowUp'&&dir.y===0)dir={x:0,y:-1};
  else if(e.key==='ArrowDown'&&dir.y===0)dir={x:0,y:1};
  else if(e.key==='ArrowLeft'&&dir.x===0)dir={x:-1,y:0};
  else if(e.key==='ArrowRight'&&dir.x===0)dir={x:1,y:0};
});

init();draw();
</script>
</body>
</html>
